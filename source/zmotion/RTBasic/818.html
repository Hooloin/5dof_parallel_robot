<h3><a name="_Toc29154"></a><a name="_UNPACK_--_打包文件解压"></a><span lang=EN-US>UNPACK -- </span><span style='font-family:宋体;'>打包文件解压</span></h3>

<table class=MsoNormalTable border=0 cellspacing=0 cellpadding=0 width="100%" style='width:100.0%;border-collapse:collapse;'> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt; height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体; color:black'>类型</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border:solid windowtext 1.0pt; border-left:none;padding: 0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span style='font-family:宋体; color:black'>文件</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体; color:black'>描述</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span style='font-family:宋体; '>将</span><span lang=EN-US>.zpk</span><span style='font-family:宋体; '>后缀的压缩文件解压</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体; color:black'>语法</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span lang=EN-US>UNPACK(pack_name,mode[,path])</span></p>
<p class=MsoNormal><span lang=EN-US>&nbsp;</span></p>
<p class=MsoNormal><span style='font-family:宋体; '>参数：</span></p>
<p class=MsoNormal style='text-indent:21.1pt;'><b><span lang=EN-US>pack_name</span></b><b><span style='font-family:宋体; '>：</span></b><span style=' font-family:宋体;'>打包压缩文件，</span><span lang=EN-US>.zpk</span><span style=' font-family:宋体;'>扩展名，不能省略</span></p>
<p class=MsoNormal style='text-indent:21.1pt;'><b><span lang=EN-US>mode</span></b><b><span style='font-family:宋体; '>：</span></b><span style=' font-family:宋体;'>解压文件已存在的处理方式：</span><span lang=EN-US>0-</span><span style=' font-family:宋体;'>直接报错；</span><span lang=EN-US>1-</span><span style=' font-family:宋体;'>全部解压，已存在文件覆盖；</span><span lang=EN-US>2-</span><span style=' font-family:宋体;'>跳过已存在文件，解压其余文件</span></p>
<p class=MsoNormal style='text-indent:21.1pt;'><b><span lang=EN-US>path</span></b><b><span style='font-family:宋体; '>：</span></b><span style=' font-family:宋体;'>解压目的路径，为空或缺省则解压到当前目录</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体; color:black'>适用控制器</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span style='font-family:宋体; '>支持</span><span lang=EN-US>ZV</span><span style='font-family:宋体; '>功能或者</span><span lang=EN-US>5</span><span style='font-family:宋体; '>系列以上的控制器</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体; color:black'>例子</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span lang=EN-US>UNPACK(&quot;3.zpk&quot;,1)'</span><span style='font-family:宋体;'>将</span><span lang=EN-US>3.zpk</span><span style='font-family:宋体;'>解压到所在目录</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体; color:black'>相关指令</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><a href="817.html#_PACK_--_文件或目录打包压缩"><span lang=EN-US style='color:#9999CC'>PACK</span></a></p>
</td>  </tr> </table>
