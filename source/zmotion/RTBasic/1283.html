<p class=MsoNormal><span style='font-family:宋体; color:black'>形状模板匹配</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.6%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>

</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.6%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>

</td>  <td width="82%" valign=top style='width:82.4%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span lang=EN-US>ZV_SHAPEPARAM(model,tabId)</span></p>
<p class=MsoNormal><span lang=EN-US>&nbsp;</span></p>
<p class=MsoNormal><span style='font-family:宋体; '>参数：</span></p>
<p class=MsoNormal style='text-indent:21.1pt;'><b><span lang=EN-US>model</span></b><b><span style='font-family:宋体; '>：</span></b><span lang=EN-US>ZVOBJECT</span><span style='font-family:宋体; '>类型，源形状模板</span></p>
<p class=MsoNormal style='text-indent:21.1pt;'><b><span lang=EN-US>tabId</span></b><b><span style='font-family:宋体; '>：</span></b><span lang=EN-US>TABLE</span><span style='font-family:宋体; '>索引，输出参数，获取的模板参数，依次为</span><span lang=EN-US>angleStart</span><span style='font-family:宋体; '>、</span><span lang=EN-US>angleEnd</span><span style='font-family:宋体; '>、</span><span lang=EN-US>scaleMin</span><span style='font-family:宋体; '>、</span><span lang=EN-US>scaleMax</span><span style='font-family:宋体; '>、</span><span lang=EN-US>thresh</span><span style='font-family:宋体; '>、</span><span lang=EN-US>levelNum</span><span style='font-family:宋体; '>，即起始角度、终止角度、最小缩放、最大缩放、边缘阈值、金字塔层数</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.6%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体; color:black'>适用控制器</span></b></p>
</td>  <td width="82%" valign=top style='width:82.4%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span style='font-family:宋体; '>支持</span><span lang=EN-US>ZV</span><span style='font-family:宋体; '>功能或者</span><span lang=EN-US>5</span><span style='font-family:宋体; '>系列以上的控制器</span></p>
</td>  </tr> </table>
