<h3><a name="_Toc198286493"><span lang=EN-US>ZSMOOTH_MODE -- </span></a><span style='font-family:宋体;'>平滑速度曲线模式</span></h3>

<table class=MsoNormalTable border=0 cellspacing=0 cellpadding=0 width="100%" style='width:100.0%;border-collapse:collapse;'> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt; height:17.0pt'>
<p class=MsoNormal style='layout-grid-mode:char;'><b><span style='font-family:宋体;color:black; '>类型</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border:solid windowtext 1.0pt; border-left:none;padding: 0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span style='font-family:宋体; color:black;'>轴参数</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>

<p class=MsoNormal style='layout-grid-mode:char;'><b><span style='font-family:宋体;color:black; '>多个小段合一的方式平滑速度曲线。</span></b></p>
<p class=MsoNormal><span style='font-family:宋体; color:black;'>注意</span><span lang=EN-US style='color:black;'>: </span><span style='font-family:宋体;color:black;'>最长平滑</span><span lang=EN-US style='color:black;'>2</span><span style='font-family:宋体;color:black;'>倍倒角距离。平顺会导致多个小运动段变成一个运动段，</span><span lang=EN-US style='color:black;'>MTYPE</span><span style='font-family:宋体;color:black;'>与</span><span lang=EN-US style='color:black;'>MARK</span><span style='font-family:宋体;color:black;'>会有差异，结束运动必须调用结束设置，否则可能导致最后几个小运动段位于等待状态。</span></p>
<p class=MsoNormal><span style='font-family:宋体; color:black;'>夹角超过减速角度的线段之间，不平滑</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal style='layout-grid-mode:char;'><b><span style='font-family:宋体;color:black; '>语法</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span lang=EN-US style='color:black;'>ZSMOOTH_MODE=mode</span></p>
<p class=MsoNormal><span lang=EN-US style='color:black;'>mode</span><span style='font-family:宋体;color:black; '>：</span><span lang=EN-US style='color:black;'>0-</span><span style='font-family:宋体;color:black; '>不使用平滑；</span><span lang=EN-US style='color:black;'>1-</span><span style='font-family:宋体;color:black; '>缺省模式</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal style='layout-grid-mode:char;'><b><span style='font-family:宋体;color:black; '>适用控制器</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span lang=EN-US style='color:black; '>4</span><span style=' font-family:宋体;color:black;'>系列以上控制器，</span><span lang=EN-US style='color:black;'>230908</span><span style=' font-family:宋体;color:black;'>以后固件支持</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal style='layout-grid-mode:char;'><b><span style='font-family:宋体;color:black; '>例子</span></b></p>

<p class=MsoNormal><span lang=EN-US style='color:black;'>ZSMOOTH_MODE=1</span></p>
