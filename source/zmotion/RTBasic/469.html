<p class=MsoNormal style='layout-grid-mode:char;'><b><span style='font-family:宋体;color:black;'>锁定控制器</span></b><b><span style='font-family:宋体;color:black;'>，</span></b><b><span style='font-family:宋体;color:black;'>不让对控制器操作。</span></b></p>
<p class=MsoNormal><span style='font-family: 宋体; color:black;'>上位机的</span><span lang=EN-US style='color:black;'>zpj</span><span style='font-family:宋体;color:black;'>程序仍可以修改，无法下载到控制器，但生成的</span><span lang=EN-US style='color:black;'>zar</span><span style='font-family:宋体;color:black;'>文件仍可下载。</span></p>
<p class=MsoNormal><span style='font-family: 宋体; color:black;'>会阻止对控制器的枚举操作，比如打印所有数组等，但可以打印具体数组的值。</span></p>
<p class=MsoNormal><span lang=EN-US style='color:red;'>LOCK</span><span style='font-family:宋体;color:red;'>密码采用不可逆算法加密，一旦忘记，将不可获知，</span><span lang=EN-US style='color:red;'>pass</span><span style='font-family:宋体;color:red;'>不能设置变量或表达式，否则变量名等会被认为是密码。</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal style='layout-grid-mode:char;'><b><span style='font-family:宋体;color:black;'>语法</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span lang=FR>LOCK<span style='color: black'> (pass)</span></span></p>
<p class=MsoNormal style='text-indent:21.0pt; '><span lang=EN-US style='color:black; '>pass</span><span style='font-family: 宋体; color:black;'>：字母或数字，“</span><span lang=EN-US style='color:black;'>_</span><span style='font-family:宋体;color:black;'>”等少数特殊符号，总共不要超过</span><span lang=EN-US style='color:black;'>16</span><span style='font-family:宋体;color:black;'>个字符</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal style='layout-grid-mode:char;'><b><span style='font-family:宋体;color:black;'>适用控制器</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
