<p class=MsoNormal><span style='font-family:宋体;color:black'>保存相机的内置参数或参数文件。</span></p>
<p class=MsoNormal><span lang=EN-US style='font-family:宋体;color:black'>&nbsp;</span></p>
<p class=MsoNormal><span style='font-family:宋体;color:black'>指令参数<span lang=EN-US>config_data</span>指示了参数的来源：</span></p>
<p class=MsoListParagraph style='margin-left:10.5pt;text-indent:0cm;line-height:130%; layout-grid-mode:char;text-autospace:none;word-break:break-all'><span lang=EN-US style='font-family:宋体;'>1.</span><span style='font-family:宋体'>冒号开头的字符串识别为保存的用户配置集<span lang=EN-US>UserSet</span>，如<span lang=EN-US>&quot;:UserSet1&quot;</span>，不能为默认集<span lang=EN-US>0</span>；</span></p>
<p class=MsoListParagraph style='margin-left:10.5pt;text-indent:0cm;line-height:130%; layout-grid-mode:char;text-autospace:none;word-break:break-all'><span lang=EN-US style='line-height:130%;font-family:宋体;color:black'>2.</span><span style='font-family:宋体'>否则识别为文件名，保存参数到对应的文件。</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体;color:black'>语法</span></b></p>
</td>  <td width="82%" valign=top style='width:82.38%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span lang=EN-US style='font-family:宋体;color:black'>CAM_SaveConfig(configData)</span></p>
<p class=MsoNormal><span lang=EN-US style='font-family:宋体'>&nbsp;</span></p>
<p class=MsoNormal><span style='font-family:宋体'>参数：</span></p>
<p class=MsoNormal style='text-indent:21.1pt;'><b><span lang=EN-US style='font-family:宋体'>config_data</span></b><b><span style='font-family:宋体'>：</span></b><span style=' font-family:宋体'>字符串，保存参数配置的目标位置</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体;color:black'>适用控制器</span></b></p>

<p class=MsoNormal><span style='font-family:宋体'>支持<span lang=EN-US>ZV</span>功能或者<span lang=EN-US>5</span>系列以上的控制器</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
