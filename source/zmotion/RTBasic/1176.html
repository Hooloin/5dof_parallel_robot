<h3><a name="_Toc19348"><span lang=EN-US>ZV_CalGetPose -- </span></a><span style='font-family:宋体;'>位姿</span></h3>

<table class=MsoNormalTable border=0 cellspacing=0 cellpadding=0 width="100%" style='width:100.0%;border-collapse:collapse;'> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.36%;border:solid windowtext 1.0pt; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt; height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体;color:black'>类型</span></b></p>
</td>  <td width="82%" valign=top style='width:82.64%;border:solid windowtext 1.0pt; border-left:none;padding: 0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span style='font-family:宋体;color:black'>标定</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.36%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>

</td>  <td width="82%" valign=top style='width:82.64%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span style='font-family:宋体;color:black'>获取相机位姿的欧拉参数，即相机相对于世界坐标轴各自的旋转角度和位置<span lang=EN-US>(</span>仅支持针孔标定模型<span lang=EN-US>)</span></span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.36%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体;color:black'>语法</span></b></p>
</td>  <td width="82%" valign=top style='width:82.64%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span lang=EN-US>ZV_CalGetPose(param,tabId)</span></p>
<p class=MsoNormal><span lang=EN-US>&nbsp;</span></p>
<p class=MsoNormal><span style='font-family:宋体;'>参数：</span></p>
<p class=MsoNormal style='text-indent:21.1pt;'><b><span lang=EN-US>param</span></b><b><span style='font-family:宋体;'>：</span></b><span lang=EN-US>ZVOBJECT</span><span style='font-family:宋体;'>类型，标定参数</span></p>
<p class=MsoNormal style='text-indent:21.1pt;'><b><span lang=EN-US>tabId</span></b><b><span style='font-family:宋体;'>：</span></b><span lang=EN-US>Table</span><span style='font-family:宋体;'>索引，获取的欧拉参数，依次为</span><span lang=EN-US>rxAngle,ryAngle,rzAngle,tx,ty,tz</span><span style='font-family:宋体;'>，分别为相机相对于世界坐标系坐标轴的旋转角度和坐标原点的平移量，其中角度为右手坐标系，</span><span style=' font-family:宋体;color:red'>逆时针正</span><span style='font-family:宋体; '>，范围</span><span lang=EN-US>(-180</span><span style='font-family:宋体;'>，</span><span lang=EN-US>180]</span><span style='font-family:宋体;'>，单位度数</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.36%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体;color:black'>适用控制器</span></b></p>
</td>  <td width="82%" valign=top style='width:82.64%;border-top:none;border-left: none;border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span style='font-family:宋体'>支持<span lang=EN-US>ZV</span>功能或者<span lang=EN-US>5</span>系列以上的控制器</span></p>
</td>  </tr> </table>
