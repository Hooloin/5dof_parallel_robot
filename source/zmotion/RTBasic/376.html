<p class=MsoNormal style='layout-grid-mode:char;'><b><span style='font-family:宋体;color:black;'>微分增益，非模拟量伺服不支持。</span></b></p>
<p class=MsoNormal><span lang=EN-US style='color:black; '>D_GAIN</span><span style='font-family:宋体;color:black;'>包括轴的微分增益。微分输出与跟随误差的变化量成正比，缺省：</span><span lang=EN-US style='color:black;'>0</span><span style='font-family:宋体;color:black;'>。</span> </p>
<p class=MsoNormal><span style='font-family:宋体;color:black; '>给系统叠加微分增益会产生平滑响应，允许更大的比例增益，太高会产生震动。</span> </p>
<p class=MsoNormal><span style='font-family:宋体;color:black; '>注意：为了避免不稳定，伺服增益应该在</span><span lang=EN-US style='color:black;'>SERVO=OFF</span><span style='font-family:宋体;color:black;'>时改变。</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="17%" valign=top style='width:17.62%;border:solid windowtext 1.0pt; border-top:none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>

<p class=MsoNormal><span lang=EN-US>VAR1 = D_GAIN</span><span style='font-family:宋体;'>，</span><span lang=EN-US style='color:black;'>VAR1 = D_GAIN</span></p>
