<p class=MsoNormal style='vertical-align:middle'><span lang=EN-US>CAD_DISPLAY(mode)</span></p>
<p class=MsoNormal style='vertical-align:middle'><span lang=EN-US>mode = CAD_DISPLAY()</span></p>
<p class=MsoNormal style='margin-left:21.0pt; vertical-align:middle'><span lang=EN-US>mode</span><span style=' font-family:宋体;'>：显示模式上电默认为</span><span lang=EN-US>0</span></p>
<p class=MsoNormal style='margin-left:42.0pt; vertical-align:middle'><span lang=EN-US>bit0</span><span style=' font-family:宋体;'>：</span><span lang=EN-US>1</span><span style='font-family:宋体; '>，是否显示不封闭图形</span></p>
<p class=MsoNormal style='margin-left:42.0pt; vertical-align:middle'><span lang=EN-US>bit1</span><span style=' font-family:宋体;'>：</span><span lang=EN-US>2</span><span style='font-family:宋体; '>，是否显示空移</span></p>
<p class=MsoNormal style='margin-left:42.0pt; vertical-align:middle'><span lang=EN-US>bit2</span><span style=' font-family:宋体;'>：</span><span lang=EN-US>4</span><span style='font-family:宋体; '>，是否显示顺序</span></p>
<p class=MsoNormal style='margin-left:42.0pt; vertical-align:middle'><span lang=EN-US>bit3</span><span style=' font-family:宋体;'>：</span><span lang=EN-US>8</span><span style='font-family:宋体; '>，是否显示起点</span></p>
<p class=MsoNormal style='margin-left:42.0pt; vertical-align:middle'><span lang=EN-US>bit4</span><span style=' font-family:宋体;'>：</span><span lang=EN-US>16</span><span style='font-family:宋体; '>，是否显示方向</span></p>
<p class=MsoNormal style='margin-left:42.0pt; vertical-align:middle'><span lang=EN-US>bit5</span><span style=' font-family:宋体;'>：</span><span lang=EN-US>32</span><span style='font-family:宋体; '>，动作点是否高亮</span></p>
