<h3><a name="_Toc17982"><span lang=EN-US>System_ZvTasks -- </span></a><span style='font-family:宋体;'>控制器任务模式</span></h3>

<table class=MsoNormalTable border=0 cellspacing=0 cellpadding=0 width="100%" style='width:100.0%;border-collapse:collapse;'> <tr style='height:17.0pt'> <td width="18%" style='width:18.14%;border:solid windowtext 1.0pt;background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt; height:17.0pt'>

</td>  <td width="81%" style='width:81.86%;border:solid windowtext 1.0pt;border-left: none; padding:0cm 5.4pt 0cm 5.4pt; height:17.0pt'>
<p class=MsoNormal><span style='font-family:宋体; color:black'>性能模式</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="18%" style='width:18.14%;border:solid windowtext 1.0pt;border-top: none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>

</td>  <td width="81%" style='width:81.86%;border-top:none;border-left:none; border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span style='font-family:宋体; color:black'>设置视觉模块任务数，缺省值为</span><span lang=EN-US style='color:black'>1</span><span style='font-family:宋体; color:black'>，设置</span><span lang=EN-US style='color:black'>2</span><span style='font-family:宋体; color:black'>或</span><span lang=EN-US style='color:black'>3</span><span style='font-family:宋体; color:black'>可以加快多任务执行</span><span lang=EN-US style='color:black'>ZV</span><span style='font-family:宋体; color:black'>指令的速度，对于大图像建议调大该参数，否则可能会导致显示闪烁或不完整。</span></p>
<p class=MsoNormal><b><span style='font-family:宋体; color:black'>大于</span></b><b><span lang=EN-US style='color:black'>200</span></b><b><span style='font-family:宋体; color:black'>万像素的图像建议设置为</span></b><b><span lang=EN-US style='color:black'>2</span></b><b><span style='font-family:宋体; color:black'>，大于</span></b><b><span lang=EN-US style='color:black'>500</span></b><b><span style='font-family:宋体; color:black'>万像素的图像建议设置为</span></b><b><span lang=EN-US style='color:black'>3</span></b></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="18%" style='width:18.14%;border:solid windowtext 1.0pt;border-top: none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体; color:black'>语法</span></b></p>
</td>  <td width="81%" style='width:81.86%;border-top:none;border-left:none; border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span lang=EN-US>System_ZvTasks = task</span></p>
<p class=MsoNormal><span lang=EN-US>&nbsp;</span></p>
<p class=MsoNormal><span style='font-family:宋体; '>参数：</span></p>
<p class=MsoNormal style='text-indent:21.0pt;'><span lang=EN-US>task</span><span style='font-family:宋体; '>：</span><span lang=EN-US>task</span><span style='font-family:宋体; '>为视觉模块任务数</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="18%" style='width:18.14%;border:solid windowtext 1.0pt;border-top: none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体; color:black'>适用控制器</span></b></p>
</td>  <td width="81%" style='width:81.86%;border-top:none;border-left:none; border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span style='font-family:宋体; '>支持</span><span lang=EN-US>ZV</span><span style='font-family:宋体; '>功能或者</span><span lang=EN-US>5</span><span style='font-family:宋体; '>系列以上的控制器</span></p>
</td>  </tr> <tr style='height:17.0pt'> <td width="18%" style='width:18.14%;border:solid windowtext 1.0pt;border-top: none; background:#8DB3E2;padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><b><span style='font-family:宋体; color:black'>例子</span></b></p>
</td>  <td width="81%" style='width:81.86%;border-top:none;border-left:none; border-bottom:solid windowtext 1.0pt;border-right:solid windowtext 1.0pt; padding:0cm 5.4pt 0cm 5.4pt;height:17.0pt'>
<p class=MsoNormal><span lang=EN-US>System_ZvTasks = 2'</span><span style=' font-family:宋体;'>设置视觉模块任务数为</span><span lang=EN-US>2</span></p>
