<p class=MsoNormal style='vertical-align:middle'><span lang=EN-US>CAD_MOUSE(mode)</span></p>
<p class=MsoNormal style='vertical-align:middle'><span lang=EN-US>mode = CAD_MOUSE()</span></p>
<p class=MsoNormal style='margin-left:21.0pt; vertical-align:middle'><span lang=EN-US>mode</span><span style=' font-family:宋体;'>：鼠标控制模式，上电默认为</span><span lang=EN-US>0</span></p>
<p class=MsoNormal style='margin-left:42.0pt; vertical-align:middle'><span lang=EN-US>0</span><span style=' font-family:宋体;'>：视图平移</span></p>
<p class=MsoNormal style='margin-left:42.0pt; vertical-align:middle'><span lang=EN-US>1</span><span style=' font-family:宋体;'>：视图缩放，向上滑动</span><span lang=EN-US>=&gt;</span><span style='font-family:宋体; '>放大，向下滑动</span><span lang=EN-US>=&gt;</span><span style='font-family:宋体; '>缩小</span></p>
<p class=MsoNormal style='margin-left:42.0pt; vertical-align:middle'><span lang=EN-US>2</span><span style=' font-family:宋体;'>：选择轨迹，鼠标点击或划过区域的轨迹将处于选中状态</span></p>
<p class=MsoNormal style='margin-left:42.0pt; vertical-align:middle'><span lang=EN-US>3</span><span style=' font-family:宋体;'>：原点设置，鼠标点击位置设为原点</span></p>
<p class=MsoNormal style='margin-left:21.0pt; vertical-align:middle'><span style='font-family: 宋体; color:red;'>注：</span><span lang=EN-US style='color:red;'>mode=2</span><span style='font-family:宋体;color:red;'>选择轨迹可分两种框选方式，向右边框选需要完全包含该图形才会选中，向左边框选仅需要包含一部分即可选中。</span></p>
